<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <g transform="translate(4, 3)">
    <!-- PDF page back -->
    <rect x="8" y="0" width="14" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- PDF page front -->
    <rect x="2" y="5" width="14" height="18" rx="2" fill="#fff"/>
    <!-- Cover accent bar -->
    <rect x="2" y="5" width="14" height="6" rx="2" fill="#fde68a"/>
    <rect x="2" y="9" width="14" height="2" fill="#fde68a"/>
    <!-- Lines on page -->
    <rect x="5" y="14" width="8" height="1.2" rx="0.6" fill="rgba(180,83,9,0.25)"/>
    <rect x="5" y="17" width="6" height="1.2" rx="0.6" fill="rgba(180,83,9,0.25)"/>
    <rect x="5" y="20" width="7" height="1.2" rx="0.6" fill="rgba(180,83,9,0.25)"/>
    <!-- Swap arrow -->
    <g transform="translate(15, 14)">
      <path d="M2,0 L6,3.5 L2,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
