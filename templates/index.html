<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Cover Replacer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=6">
</head>
<body>

    <!-- Noise texture overlay -->
    <div class="noise"></div>

    <!-- Top nav -->
    <nav class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-mark">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <path d="M12 18v-6"/><path d="M9 15l3-3 3 3"/>
                    </svg>
                </div>
                <span class="brand-name">CoverSwap</span>
                <span class="brand-tag">v2.0</span>
            </div>
            <div class="topbar-right">
                <span class="status-dot"></span>
                <span class="status-text">Pronto</span>
            </div>
        </div>
    </nav>

    <main class="main">
        <!-- Hero -->
        <section class="hero">
            <h1>Substitua capas de PDFs<br><span class="hero-accent">por materia, em segundos.</span></h1>
            <p class="hero-sub">Adicione materias, anexe as capas e os PDFs de cada uma. Nos cuidamos do resto.</p>
        </section>

        <!-- Subjects container -->
        <section id="subjects-section">
            <div id="subjects-list"></div>

            <button class="btn-add-subject" id="add-subject-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>Adicionar Materia</span>
            </button>
        </section>

        <!-- Action bar -->
        <section class="action-bar" id="step-process">
            <button class="btn-process" id="process-btn" disabled>
                <span class="btn-process-text">Substituir Capas</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
        </section>

        <!-- Progress -->
        <section class="progress-section" id="step-progress" hidden>
            <div class="progress-card">
                <div class="progress-top">
                    <span class="progress-label" id="progress-text">Processando...</span>
                    <span class="progress-pct" id="progress-pct">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </section>

        <!-- Results -->
        <section class="results-section" id="step-results" hidden>
            <div class="results-header">
                <div class="results-banner" id="results-banner">
                    <div class="results-banner-icon" id="results-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="results-banner-text">
                        <h2 id="results-title">Concluido!</h2>
                        <p id="results-summary"></p>
                    </div>
                    <button class="btn-download-all" id="download-all-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Baixar Todos</span>
                    </button>
                </div>
            </div>

            <div id="results-by-subject"></div>

            <div class="results-footer">
                <button class="btn-reset" id="reset-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    <span>Novo processamento</span>
                </button>
            </div>
        </section>
    </main>

    <script src="/static/app.js?v=6"></script>
</body>
</html>
